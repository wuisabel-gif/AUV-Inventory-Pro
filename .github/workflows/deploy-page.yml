name: Deploy web demo to GitHub Pages

# Publishes the static browser build in web-demo/ to GitHub Pages.
on:
  push:
    branches: [main]
    paths:
      - 'web-demo/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch: # lets you trigger a deploy manually from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; cancel older in-progress runs.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web-demo            # the folder served as the site root
      - id: deployment
        uses: actions/deploy-pages@v4
